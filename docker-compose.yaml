services:
  homeassistant:
    container_name: homeassistant
    image: ghcr.io/home-assistant/home-assistant:beta
    ports:
      - 8123:8123
    volumes:
      - $PWD/.homeassistant/config:/config
      - $PWD/custom_components:/config/custom_components
      - $PWD/dev/configuration.yaml:/config/configuration.yaml:ro
      - /etc/localtime:/etc/localtime:ro
    restart: unless-stopped
    develop:
      watch:
        - action: restart
          path: ./custom_components
        - action: restart
          path: ./dev/configuration.yaml
